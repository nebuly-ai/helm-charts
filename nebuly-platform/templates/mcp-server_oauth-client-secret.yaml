{{- if and .Values.mcpServer.enabled .Values.mcpServer.oauthClient.createSecret -}}
{{- $secretName := (.Values.mcpServer.oauthClient.existingSecret.name | default (printf "%s-oauth-client" (include "mcpServer.fullname" .))) -}}
{{- $secretKey := (.Values.mcpServer.oauthClient.existingSecret.key | default "client-secret") -}}
{{- $existing := (lookup "v1" "Secret" (include "nebuly-platform.namespace" .) $secretName) -}}
{{- $existingData := (dig "data" $secretKey "" $existing) -}}
{{- $clientSecret := (ternary ($existingData | b64dec) "" (ne $existingData "")) | default (.Values.mcpServer.oauthClient.clientSecret | default (randAlphaNum 48)) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ include "nebuly-platform.namespace" . }}
  labels:
    {{- include "mcpServer.labels" . | nindent 4 }}
  annotations:
    {{- include "nebuly-platform.annotations" . | nindent 4 }}
type: Opaque
stringData:
  {{ $secretKey }}: {{ $clientSecret | quote }}
{{- end -}}
