{{- if .Values.collector.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: nebuly-collector-env
  namespace: {{ include "nebuly-platform.namespace" . }}
  annotations:
    {{- include "nebuly-platform.annotations" . | nindent 4 }}
data:
  PLATFORM_VERSION: {{ printf "v%s" .Chart.Version | quote }}
{{- end }}
